[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.gd",
  "php82Extensions.zip",
  "nodejs",
  "php82Packages.composer"
]

[phases.install]
cmds = [
  "composer install --ignore-platform-req=ext-gd --no-interaction --prefer-dist --optimize-autoloader",
  "npm install"
]

[phases.build]
cmds = [
  "npm run build"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"